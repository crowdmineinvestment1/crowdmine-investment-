<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    <title>CryptoTab Farm | Command Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f7931a;
            --bg: #0a0a0f;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --glow: rgba(247, 147, 26, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; }
        body { background-color: var(--bg); color: #fff; overflow-x: hidden; min-height: 100vh; }

        /* Blockchain Canvas */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
        }

        /* Top Navigation */
        .navbar { 
            background: rgba(10, 10, 15, 0.8); 
            backdrop-filter: blur(20px);
            padding: 0 40px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            height: 80px; 
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-box { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-family: 'Orbitron', sans-serif;
            font-weight: 700; 
            font-size: 24px; 
            text-decoration: none; 
            color: #fff; 
            letter-spacing: 2px;
        }
        .logo-box span { color: var(--primary); }
        
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { 
            color: #888; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 13px; 
            text-transform: uppercase; 
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        /* Main Layout */
        .main-container { max-width: 800px; margin: 80px auto; padding: 0 20px; text-align: center; }
        
        .hero-section h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-section p { color: #888; font-size: 18px; margin-bottom: 50px; }

        .card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(30px);
            border-radius: 24px; 
            padding: 50px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 1px solid var(--border);
            text-align: left;
        }
        
        .form-group { margin-bottom: 30px; }
        .form-label { 
            display: block; 
            font-family: 'Orbitron', sans-serif;
            font-size: 12px; 
            font-weight: 700; 
            color: var(--primary); 
            margin-bottom: 10px; 
            text-transform: uppercase;
        }
        .form-input, .form-textarea {
            width: 100%;
            padding: 18px 25px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: 0.3s;
        }
        .form-input:focus, .form-textarea:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--glow); }
        .form-textarea { height: 180px; resize: none; }

        .submit-btn { 
            width: 100%; 
            background: var(--primary); 
            color: #000; 
            border: none; 
            padding: 22px; 
            border-radius: 12px; 
            font-family: 'Orbitron', sans-serif;
            font-size: 18px; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            box-shadow: 0 10px 30px var(--glow);
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px var(--glow); }

        /* Support Options */
        .support-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 50px; }
        .support-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 30px 20px;
            border-radius: 15px;
            transition: 0.3s;
            cursor: pointer;
        }
        .support-item:hover { background: rgba(255,255,255,0.06); border-color: var(--primary); }
        .support-item h4 { font-family: 'Orbitron', sans-serif; font-size: 14px; margin-bottom: 10px; color: #fff; }
        .support-item p { color: #666; font-size: 12px; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <nav class="navbar">
        <a href="../index.html" class="logo-box">
            CRYPTO<span>TAB</span> SUPPORT
        </a>
        <div class="nav-links">
            <a href="../index.html">FARM</a>
            <a href="../../../products.html">PRODUCTS</a>
            <a href="../../../app.cryptotab.farm/dashboard.html">DASHBOARD</a>
            <a href="../../../admin.html">ADMIN</a>
        </div>
    </nav>

    <div class="main-container">
        <section class="hero-section">
            <h1>Protocol Support Center</h1>
            <p>Our engineers are standing by to assist with your node configuration.</p>
        </section>

        <div class="card">
            <div class="form-group">
                <label class="form-label">Subject Authority</label>
                <input type="text" class="form-input" placeholder="e.g. Node Syncing Error">
            </div>
            <div class="form-group">
                <label class="form-label">Email Node Identity</label>
                <input type="email" class="form-input" placeholder="node-identifier@network.com">
            </div>
            <div class="form-group">
                <label class="form-label">Transmission Log</label>
                <textarea class="form-textarea" placeholder="Describe the protocol error or inquiry..."></textarea>
            </div>
            <button class="submit-btn" onclick="alert('Inquiry transmitted to CryptoTab Support Network.')">Transmit Ticket</button>
        </div>

        <div class="support-grid">
            <div class="support-item">
                <h4>Knowledge Base</h4>
                <p>Read protocol documentation.</p>
            </div>
            <div class="support-item">
                <h4>Network Status</h4>
                <p>Check node availability.</p>
            </div>
            <div class="support-item">
                <h4>Live Console</h4>
                <p>Talk to an operator.</p>
            </div>
        </div>
    </div>

    <script>
        // Blockchain Animation
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let nodes = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Node {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
        }

        for (let i = 0; i < 60; i++) nodes.push(new Node());

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < nodes.length; i++) {
                nodes[i].update();
                for (let j = i + 1; j < nodes.length; j++) {
                    let dx = nodes[i].x - nodes[j].x;
                    let dy = nodes[i].y - nodes[j].y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 200) {
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
