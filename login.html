<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>CrowdMine Investment | Login & Signup</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../dashboard-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="auth.js"></script>
    
    <style>
        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 640px) {
            .card {
                padding: 40px 30px;
            }
        }

        .logo {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: var(--orange);
            margin-bottom: 8px;
        }

        @media (min-width: 640px) {
            .logo {
                font-size: 28px;
            }
        }

        h2 {
            text-align: center;
            font-size: 20px;
            margin-bottom: 10px;
            color: var(--text);
        }

        @media (min-width: 640px) {
            h2 {
                font-size: 24px;
            }
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border2);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            font-family: var(--font);
        }

        input:focus {
            border-color: var(--orange);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 3px rgba(247,147,26,0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--orange), #e07f0f);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(247,147,26,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--muted);
        }

        .form-footer a {
            color: var(--orange);
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .message {
            margin-top: 12px;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            text-align: center;
            min-height: 20px;
        }

        .message.error {
            background: rgba(255,77,77,0.1);
            color: var(--red);
            border: 1px solid rgba(255,77,77,0.2);
        }

        .message.success {
            background: rgba(0,255,163,0.1);
            color: var(--green);
            border: 1px solid rgba(0,255,163,0.2);
        }

        .hidden {
            display: none;
        }

        /* Loading state */
        .btn.loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        
        <!-- Login Form -->
        <div id="loginScreen">
            <div class="logo">₿ CrowdMine</div>
            <h2>Login</h2>
            <p class="subtitle">Access your account</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn" id="loginBtn">Sign In</button>
                <div id="loginMessage" class="message hidden"></div>
            </form>

            <div class="form-footer">
                Don't have an account? <a onclick="toggleForms()">Create One</a>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerScreen" class="hidden">
            <div class="logo">₿ CrowdMine</div>
            <h2>Create Account</h2>
            <p class="subtitle">Join thousands of miners</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="registerName" placeholder="John Doe" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="registerEmail" placeholder="your@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="registerPassword" placeholder="••••••••" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="registerConfirm" placeholder="••••••••" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn" id="registerBtn">Create Account</button>
                <div id="registerMessage" class="message hidden"></div>
            </form>

            <div class="form-footer">
                Already have an account? <a onclick="toggleForms()">Login</a>
            </div>
        </div>

    </div>
</div>

<script>
    /**
     * CrowdMine Authentication System
     */

    // Toggle between login and register forms
    function toggleForms() {
        const loginScreen = document.getElementById('loginScreen');
        const registerScreen = document.getElementById('registerScreen');
        loginScreen.classList.toggle('hidden');
        registerScreen.classList.toggle('hidden');
        
        // Clear messages
        document.getElementById('loginMessage').classList.add('hidden');
        document.getElementById('registerMessage').classList.add('hidden');
    }

    // Show message
    function showMessage(elementId, message, isError = false) {
        const messageEl = document.getElementById(elementId);
        messageEl.textContent = message;
        messageEl.className = 'message ' + (isError ? 'error' : 'success');
        messageEl.classList.remove('hidden');
    }

    // Login Form Handler
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const btn = document.getElementById('loginBtn');
        
        btn.classList.add('loading');
        btn.innerHTML = 'Signing In... <div class="loader"></div>';
        
        setTimeout(() => {
            const result = auth.login(email, password);
            
            if (result.success) {
                showMessage('loginMessage', 'Login successful! Redirecting...', false);
                setTimeout(() => {
                    const redirect = new URLSearchParams(window.location.search).get('redirect');
                    window.location.href = redirect || 'dashboard.html';
                }, 800);
            } else {
                showMessage('loginMessage', result.error, true);
                btn.classList.remove('loading');
                btn.innerHTML = 'Sign In';
            }
        }, 600);
    });

    // Register Form Handler
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('registerName').value.trim();
        const email = document.getElementById('registerEmail').value.trim();
        const password = document.getElementById('registerPassword').value;
        const confirm = document.getElementById('registerConfirm').value;
        const btn = document.getElementById('registerBtn');
        
        // Validate
        if (password !== confirm) {
            showMessage('registerMessage', 'Passwords do not match', true);
            return;
        }
        
        btn.classList.add('loading');
        btn.innerHTML = 'Creating Account... <div class="loader"></div>';
        
        setTimeout(() => {
            const result = auth.register(email, password, name);
            
            if (result.success) {
                showMessage('registerMessage', result.message, false);
                setTimeout(() => {
                    // Auto-login after registration
                    const loginResult = auth.login(email, password);
                    if (loginResult.success) {
                        const redirect = new URLSearchParams(window.location.search).get('redirect');
                        window.location.href = redirect || 'dashboard.html';
                    }
                }, 1200);
            } else {
                showMessage('registerMessage', result.error, true);
                btn.classList.remove('loading');
                btn.innerHTML = 'Create Account';
            }
        }, 600);
    });

    // If already logged in, redirect to dashboard
    if (auth && auth.isLoggedIn()) {
        window.location.href = 'dashboard.html';
    }
</script>

</body>
</html>
