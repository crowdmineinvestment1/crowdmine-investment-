<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrowdMine Investment - Subscribe</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --error-color: #ef4444;
            --success-color: #10b981;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
            font-weight: 600;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1rem;
            text-align: left;
        }

        input[type="email"] {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
            background-color: #f8fafc;
        }

        input[type="email"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background-color: #ffffff;
        }

        button {
            width: 100%;
            padding: 0.875rem 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .message {
            margin-top: 1rem;
            font-size: 0.9rem;
            min-height: 20px;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .message.error {
            display: block;
            color: var(--error-color);
        }

        .message.success {
            display: block;
            color: var(--success-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Stay Updated</h2>
        <p class="subtitle">Join our newsletter for the latest news.</p>
        
        <form id="subscribe-form" novalidate>
            <div class="input-group">
                <input type="email" id="email" name="email" placeholder="Enter your email address" required autocomplete="email">
            </div>
            <button type="submit">Subscribe</button>
            <div id="status-message" class="message"></div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('subscribe-form');
            const emailInput = document.getElementById('email');
            const statusMessage = document.getElementById('status-message');

            const validateEmail = (email) => {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            };

            const showMessage = (message, isError = false) => {
                statusMessage.textContent = message;
                statusMessage.className = 'message ' + (isError ? 'error' : 'success');
            };

            const clearMessage = () => {
                statusMessage.textContent = '';
                statusMessage.className = 'message';
            };

            emailInput.addEventListener('input', () => {
                if (statusMessage.classList.contains('error')) {
                    clearMessage();
                }
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                clearMessage();

                const email = emailInput.value.trim();

                if (!email) {
                    showMessage('Please enter an email address.', true);
                    emailInput.focus();
                    return;
                }

                if (!validateEmail(email)) {
                    showMessage('Please enter a valid email address.', true);
                    emailInput.focus();
                    return;
                }

                // Simulate successful submission
                const submitButton = form.querySelector('button');
                const originalText = submitButton.textContent;
                submitButton.textContent = 'Subscribing...';
                submitButton.disabled = true;

                setTimeout(() => {
                    showMessage('Successfully subscribed!', false);
                    emailInput.value = '';
                    submitButton.textContent = originalText;
                    submitButton.disabled = false;
                }, 800);
            });
        });
    </script>
</body>
</html>
